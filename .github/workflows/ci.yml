name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-dbus libgirepository-2.0-dev gir1.2-glib-2.0

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check hipi tests

      - name: Pytest
        run: pytest -q -m "not hardware"
